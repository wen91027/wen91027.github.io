<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安麗組織網 - 系統管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal {
            transition: opacity 0.2s ease;
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 100; 
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }

        .tree-line {
            position: absolute;
            left: -16px; top: -10px; bottom: 20px;
            width: 2px; background-color: #cbd5e1;
        }
        .tree-connector {
            position: absolute;
            left: -16px; top: 22px;
            width: 12px; height: 2px; background-color: #cbd5e1;
        }
        .btn-active-scale:active { transform: scale(0.96); }
        .sync-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-900 font-sans">

    <!-- 登入介面 -->
    <div id="loginModal" class="modal items-center justify-center p-6" style="display: flex;">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl text-center border border-slate-100">
            <div class="mb-4 flex justify-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </div>
            </div>
            <h2 class="text-xl font-bold mb-2">管理員登入</h2>
            <p class="text-xs text-slate-400 mb-6">請輸入您的經營編號</p>
            <input type="text" id="accountInput" placeholder="例如: 9314616" 
                class="w-full p-4 border-2 border-slate-100 rounded-2xl text-center text-xl font-bold mb-4 focus:border-blue-500 outline-none transition-colors">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg btn-active-scale hover:bg-blue-700 transition-colors">進入系統</button>
        </div>
    </div>

    <!-- 頂部選單 -->
    <header class="bg-blue-700 text-white p-4 sticky top-0 shadow-lg z-40">
        <div class="flex justify-between items-center mb-3">
            <div>
                <h1 class="text-lg font-bold tracking-tight">Amway Network</h1>
                <div class="text-[10px] flex items-center">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-gray-400 mr-1"></span>
                    <span id="displayAccount">未登入</span>
                    <span id="statusText" class="ml-1 opacity-60"></span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="syncBtn" onclick="fetchFromCloud()" class="p-2 bg-blue-600 rounded-full btn-active-scale hover:bg-blue-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
                <button onclick="openAddModal(null)" class="bg-white text-blue-700 px-4 py-1 rounded-full text-sm font-bold shadow-sm btn-active-scale">+ 新增頂層</button>
            </div>
        </div>
        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋姓名、地點、職業..." 
            class="w-full p-2.5 rounded-xl bg-blue-800 border-none text-sm text-white placeholder-blue-300 outline-none focus:ring-2 focus:ring-blue-400">
    </header>

    <!-- 組織樹容器 -->
    <main id="network-container" class="p-4 space-y-1"></main>

    <!-- 編輯彈窗 -->
    <div id="editModal" class="modal items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col shadow-2xl relative border border-slate-100">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <span class="font-bold text-slate-800">夥伴詳細資訊</span>
                <button onclick="closeModal()" class="text-slate-400 text-2xl px-2 hover:text-slate-600 transition-colors">&times;</button>
            </div>

            <div class="overflow-y-auto p-6 space-y-5 pb-32">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">姓名</label>
                        <input type="text" id="editName" class="p-3 border rounded-xl text-sm outline-none bg-slate-50 focus:bg-white focus:border-blue-400">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">身分級別</label>
                        <select id="editLevel" class="p-3 border rounded-xl text-sm outline-none bg-slate-50 focus:bg-white focus:border-blue-400">
                            <option value="distributor">直銷商 (綠色)</option>
                            <option value="member">一般會員 (橘色)</option>
                            <option value="lead">潛在對象 (紅色)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">目前職業</label>
                        <input type="text" id="editJob" class="p-3 border rounded-xl text-sm outline-none bg-slate-50">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">居住地區</label>
                        <input type="text" id="editLocation" class="p-3 border rounded-xl text-sm outline-none bg-slate-50">
                    </div>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">隸屬上層 (Parent)</label>
                    <select id="editParentId" class="p-3 border rounded-xl text-sm outline-none bg-blue-50 border-blue-100 focus:border-blue-400"></select>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold ml-1 uppercase">經營現況 / 狀態</label>
                    <textarea id="editStatus" rows="2" class="p-3 border rounded-xl text-sm outline-none resize-none bg-slate-50 focus:bg-white focus:border-blue-400" placeholder="記錄目前經營進度..."></textarea>
                </div>

                <!-- 互動日誌區塊更新 -->
                <div class="border-t pt-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase flex justify-between items-center mb-3">
                        <span>互動日誌 / Follow-up</span>
                        <span id="journalCount" class="bg-slate-100 px-2 py-0.5 rounded-full text-slate-500">0</span>
                    </label>
                    <div class="flex flex-col gap-2 mb-4">
                        <div class="flex gap-2">
                            <input type="date" id="newJournalDate" class="p-2 border rounded-lg text-xs outline-none focus:border-blue-400 bg-slate-50">
                            <input type="text" id="newJournalInput" placeholder="新增互動細節..." class="flex-1 p-2 border rounded-lg text-xs outline-none focus:border-blue-400">
                        </div>
                        <button onclick="addJournalEntry()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition-colors">新增日誌</button>
                    </div>
                    <div id="journalList" class="space-y-2"></div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-5 border-t bg-white flex gap-3">
                <button onclick="saveChanges()" class="flex-[3] bg-blue-600 text-white py-4 rounded-2xl font-bold btn-active-scale shadow-lg hover:bg-blue-700 transition-colors">儲存同步</button>
                <button onclick="confirmDelete()" class="flex-1 bg-rose-50 text-rose-600 py-4 rounded-2xl font-bold btn-active-scale border border-rose-100 hover:bg-rose-100 transition-colors">刪除</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 -->
    <div id="deleteConfirmModal" class="modal items-center justify-center p-6" style="z-index: 200;">
        <div class="bg-white rounded-3xl w-full max-w-xs p-6 shadow-2xl text-center border border-slate-100">
            <h3 class="text-lg font-bold mb-2">確定刪除此成員？</h3>
            <p class="text-sm text-gray-400 mb-6">這將一併移除其下屬所有組織成員，此操作無法撤銷。</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteConfirm()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-600">取消</button>
                <button onclick="executeDelete()" class="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold">確定刪除</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbyZ75mgqzR-A_jwdfTd7nIViAnIMMlnbL_f6wP6iXGTYzgl-hM91gM_xJ58IyxRVnM/exec"; 
        
        let currentAccount = localStorage.getItem('amway_active_acc') || "";
        let networkData = []; 
        let currentEditId = null;
        let currentFilter = "";
        let tempJournals = [];

        window.onload = () => {
            // 初始化日期選擇器為今天
            const today = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('newJournalDate');
            if (dateInput) dateInput.value = today;

            if (currentAccount) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('displayAccount').innerText = "帳號: " + currentAccount;
                loadLocalData();
                fetchFromCloud();
            }
        };

        function login() {
            const acc = document.getElementById('accountInput').value.trim();
            if (!acc) return;
            currentAccount = acc;
            localStorage.setItem('amway_active_acc', acc);
            document.getElementById('displayAccount').innerText = "帳號: " + acc;
            document.getElementById('loginModal').style.display = 'none';
            fetchFromCloud();
        }

        function loadLocalData() {
            const raw = localStorage.getItem("amway_data_" + currentAccount);
            try {
                networkData = raw ? JSON.parse(raw) : [];
                renderNetwork();
            } catch (e) {
                networkData = [];
            }
        }

        function saveLocal() {
            localStorage.setItem("amway_data_" + currentAccount, JSON.stringify(networkData));
        }

        async function fetchFromCloud() {
            if (!CLOUD_API_URL || !currentAccount) return;
            updateStatus("同步中", "blue", true);
            try {
                const res = await fetch(`${CLOUD_API_URL}?accountId=${currentAccount}`);
                const data = await res.json();
                
                networkData = data.map(item => ({
                    ...item,
                    journals: typeof item.journals === 'string' ? JSON.parse(item.journals) : (Array.isArray(item.journals) ? item.journals : [])
                }));
                
                saveLocal();
                renderNetwork();
                updateStatus("已連線", "green");
            } catch (e) {
                console.error("Fetch error:", e);
                updateStatus("連線失敗", "red");
                loadLocalData();
            }
        }

        async function uploadToCloud() {
            if (!currentAccount) return;
            updateStatus("上傳中", "blue", true);
            try {
                const payload = networkData.map(node => ({
                    ...node,
                    journals: JSON.stringify(node.journals)
                }));

                await fetch(CLOUD_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ accountId: currentAccount, data: payload }),
                    mode: 'no-cors'
                });
                
                setTimeout(() => updateStatus("已同步", "green"), 1500);
            } catch (e) {
                updateStatus("連線失敗", "red");
            }
        }

        function translateFlatToTree(flatData) {
            const map = {}; 
            const roots = [];
            flatData.forEach(node => { map[node.id] = { ...node, children: [] }; });
            flatData.forEach(node => {
                if (node.parentId && map[node.parentId]) {
                    map[node.parentId].children.push(map[node.id]);
                } else {
                    roots.push(map[node.id]);
                }
            });
            return roots;
        }

        function renderNetwork() {
            const container = document.getElementById('network-container');
            const treeData = translateFlatToTree(networkData);
            container.innerHTML = '';
            const searchLower = currentFilter.toLowerCase();

            function buildHTML(node, depth = 0) {
                const isMatched = currentFilter === "" || 
                                node.name.toLowerCase().includes(searchLower) || 
                                (node.location && node.location.toLowerCase().includes(searchLower)) ||
                                (node.job && node.job.toLowerCase().includes(searchLower));
                
                const borderColor = node.level === 'distributor' ? 'border-green-500' : (node.level === 'member' ? 'border-orange-500' : 'border-rose-500');
                const displayClass = isMatched ? 'block' : (currentFilter === "" ? 'block' : 'hidden');

                let html = `
                <div class="${displayClass}" style="margin-left: ${depth * 18}px; position: relative;">
                    ${depth > 0 ? '<div class="tree-line"></div><div class="tree-connector"></div>' : ''}
                    <div class="relative z-10 flex items-center p-3 mb-2 rounded-2xl bg-white shadow-sm border-l-4 ${borderColor} active:bg-slate-50 transition-all cursor-pointer hover:shadow-md" onclick="openEditModal('${node.id}')">
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mr-3 border text-[10px] font-bold text-slate-400">
                            ${node.name.charAt(0)}
                        </div>
                        <div class="flex-1">
                            <div class="text-sm font-bold text-slate-800">${node.name}</div>
                            <div class="text-[10px] text-slate-400">${node.location || '地區未標記'} • ${node.job || '職業未填'}</div>
                        </div>
                        <button onclick="event.stopPropagation(); openAddModal('${node.id}')" class="p-2 text-blue-500 text-xl hover:bg-blue-50 rounded-lg">＋</button>
                    </div>
                </div>`;
                if (node.children) node.children.forEach(c => html += buildHTML(c, depth + 1));
                return html;
            }
            
            if (networkData.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-300 text-sm">尚未建立組織，請點擊上方「新增頂層」</div>`;
            } else {
                treeData.forEach(root => container.innerHTML += buildHTML(root));
            }
        }

        function handleSearch() {
            currentFilter = document.getElementById('searchInput').value.trim();
            renderNetwork();
        }

        function openEditModal(id) {
            currentEditId = id;
            const n = networkData.find(x => x.id === id);
            if (!n) return;

            document.getElementById('editName').value = n.name || "";
            document.getElementById('editLevel').value = n.level || "lead";
            document.getElementById('editJob').value = n.job || "";
            document.getElementById('editLocation').value = n.location || "";
            document.getElementById('editStatus').value = n.status || "";
            
            // 重設日期為今天
            document.getElementById('newJournalDate').value = new Date().toISOString().split('T')[0];
            
            tempJournals = Array.isArray(n.journals) ? [...n.journals] : [];
            renderJournals();
            
            const parentSelect = document.getElementById('editParentId');
            parentSelect.innerHTML = '<option value="">--- (頂層) ---</option>';
            networkData.forEach(node => {
                if (node.id !== id) {
                    const opt = document.createElement('option');
                    opt.value = node.id;
                    opt.text = node.name;
                    if (node.id === n.parentId) opt.selected = true;
                    parentSelect.appendChild(opt);
                }
            });
            document.getElementById('editModal').classList.add('active');
        }

        function renderJournals() {
            const list = document.getElementById('journalList');
            document.getElementById('journalCount').innerText = tempJournals.length;
            
            // 排序：依據日期降冪（最新的在上面）
            const sortedJournals = [...tempJournals].sort((a, b) => new Date(b.date) - new Date(a.date));

            list.innerHTML = sortedJournals.map((j, index) => {
                // 在原始陣列中找到真正的索引以便刪除
                const originalIndex = tempJournals.findIndex(item => item === j);
                return `
                    <div class="bg-slate-50 p-2 rounded-lg text-[11px] flex justify-between items-start border border-slate-100">
                        <div class="flex-1">
                            <span class="font-bold text-blue-500 mr-2">${j.date}</span>
                            <span class="text-slate-700">${j.text}</span>
                        </div>
                        <button onclick="deleteJournal(${originalIndex})" class="text-rose-400 ml-2 font-bold px-1 hover:text-rose-600">&times;</button>
                    </div>
                `;
            }).join('') || '<div class="text-center text-slate-300 text-xs py-4 italic">尚無日誌紀錄</div>';
        }

        function addJournalEntry() {
            const dateInput = document.getElementById('newJournalDate');
            const textInput = document.getElementById('newJournalInput');
            
            if (!textInput.value.trim()) return;
            
            const selectedDate = dateInput.value || new Date().toISOString().split('T')[0];
            
            // 新增至暫存陣列
            tempJournals.push({ 
                date: selectedDate.replace(/-/g, '/'), 
                text: textInput.value.trim() 
            });
            
            textInput.value = '';
            renderJournals();
        }

        function deleteJournal(i) { 
            tempJournals.splice(i, 1); 
            renderJournals(); 
        }

        function saveChanges() {
            const idx = networkData.findIndex(x => x.id === currentEditId);
            if (idx === -1) return;

            networkData[idx].name = document.getElementById('editName').value || "無名";
            networkData[idx].level = document.getElementById('editLevel').value;
            networkData[idx].job = document.getElementById('editJob').value;
            networkData[idx].location = document.getElementById('editLocation').value;
            networkData[idx].status = document.getElementById('editStatus').value;
            networkData[idx].parentId = document.getElementById('editParentId').value || null;
            networkData[idx].journals = [...tempJournals];
            
            saveLocal(); 
            renderNetwork(); 
            closeModal(); 
            uploadToCloud();
        }

        function closeModal() { document.getElementById('editModal').classList.remove('active'); }
        function confirmDelete() { document.getElementById('deleteConfirmModal').classList.add('active'); }
        function closeDeleteConfirm() { document.getElementById('deleteConfirmModal').classList.remove('active'); }

        function executeDelete() {
            const idsToDelete = new Set();
            const collect = (id) => {
                idsToDelete.add(id);
                networkData.forEach(n => { if (n.parentId === id) collect(n.id); });
            };
            collect(currentEditId);
            networkData = networkData.filter(n => !idsToDelete.has(n.id));
            
            saveLocal(); 
            renderNetwork(); 
            closeDeleteConfirm(); 
            closeModal(); 
            uploadToCloud();
        }

        function openAddModal(pId) {
            const newNode = { 
                id: 'id-' + Date.now() + Math.floor(Math.random() * 100), 
                parentId: pId, 
                name: '新夥伴', 
                level: 'lead', 
                journals: [], 
                location: '', 
                job: '', 
                status: '', 
                photo: '',
                account_id: currentAccount
            };
            networkData.push(newNode);
            saveLocal(); 
            renderNetwork(); 
            openEditModal(newNode.id);
        }

        function updateStatus(txt, color, pulse) {
            const dot = document.getElementById('statusDot');
            document.getElementById('statusText').innerText = "(" + txt + ")";
            dot.className = "w-2 h-2 rounded-full mr-1 " + (pulse ? 'sync-pulse' : '');
            dot.style.backgroundColor = { blue: '#3b82f6', green: '#22c55e', red: '#ef4444', orange: '#f59e0b' }[color];
        }
    </script>
</body>
</html>
