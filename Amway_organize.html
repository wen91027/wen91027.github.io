<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amway Pro - 組織管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        .modal {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            z-index: 100; 
            backdrop-filter: blur(8px);
        }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .tree-line {
            position: absolute;
            left: -20px; top: -12px; bottom: 24px;
            width: 2px; background: linear-gradient(to bottom, #e2e8f0, #cbd5e1);
        }
        .tree-connector {
            position: absolute;
            left: -20px; top: 22px;
            width: 16px; height: 2px; background-color: #cbd5e1;
            border-radius: 0 2px 2px 0;
        }

        .btn-active-scale:active { transform: scale(0.96); }
        .rotate-90 { transform: rotate(90deg); }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .syncing-icon { animation: spin-slow 1s linear infinite; }
        
        .stat-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card.active {
            background-color: white !important;
            color: #1e40af !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .node-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .node-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-900 overflow-x-hidden">

    <!-- 登入介面 -->
    <div id="loginModal" class="modal items-center justify-center p-6" style="display: flex;">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-10 shadow-2xl text-center border border-slate-100">
            <div class="mb-6 flex justify-center">
                <div class="w-20 h-20 bg-blue-600 text-white rounded-3xl rotate-12 flex items-center justify-center shadow-xl shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 -rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-1">Amway Pro</h2>
            <p class="text-xs text-slate-400 mb-8 uppercase tracking-[0.2em] font-semibold">Leadership System</p>
            <div class="space-y-4">
                <input type="text" id="accountInput" placeholder="輸入管理員編號" 
                    class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-center text-xl font-bold transition-all outline-none">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 btn-active-scale transition-all hover:bg-blue-700">立即進入</button>
            </div>
        </div>
    </div>

    <!-- 頂部導航 -->
    <header class="bg-blue-700 text-white sticky top-0 shadow-2xl z-40 rounded-b-[2rem]">
        <div class="px-6 pt-6 pb-4">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                        Dashboard
                        <span id="syncStatusIcon" class="hidden">
                            <svg class="w-4 h-4 syncing-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </span>
                    </h1>
                    <div class="flex items-center mt-0.5">
                        <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-300 mr-2"></span>
                        <span id="displayAccount" class="text-[10px] font-bold opacity-80 uppercase tracking-wider">Loading...</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="forceSync()" class="p-3 bg-white/10 hover:bg-white/20 rounded-2xl btn-active-scale transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                    <button onclick="openAddModal(null)" class="bg-white text-blue-700 px-5 py-2 rounded-2xl text-sm font-black shadow-lg btn-active-scale transition-transform hover:scale-105">+ 新增頂層</button>
                </div>
            </div>
            
            <!-- 數據概覽 -->
            <div class="grid grid-cols-4 gap-2 mb-2">
                <div onclick="toggleStatFilter('distributor')" id="stat-distributor" class="stat-card bg-white/10 rounded-2xl p-3 flex flex-col items-center cursor-pointer">
                    <span class="text-[10px] font-bold opacity-60">直銷商</span>
                    <span id="distributorCount" class="text-lg font-black mt-0.5">0</span>
                </div>
                <div onclick="toggleStatFilter('member')" id="stat-member" class="stat-card bg-white/10 rounded-2xl p-3 flex flex-col items-center cursor-pointer">
                    <span class="text-[10px] font-bold opacity-60">會員</span>
                    <span id="memberCount" class="text-lg font-black mt-0.5">0</span>
                </div>
                <div onclick="toggleStatFilter('total')" id="stat-total" class="stat-card bg-white/10 rounded-2xl p-3 flex flex-col items-center cursor-pointer border-blue-400/30 border">
                    <span class="text-[10px] font-bold opacity-80 text-blue-100">核心</span>
                    <span id="totalFocusCount" class="text-lg font-black mt-0.5">0</span>
                </div>
                <div onclick="toggleStatFilter('lead')" id="stat-lead" class="stat-card bg-rose-500/20 rounded-2xl p-3 flex flex-col items-center cursor-pointer border border-rose-400/30">
                    <span class="text-[10px] font-bold text-rose-200">潛在</span>
                    <span id="leadCount" class="text-lg font-black text-rose-50 mt-0.5">0</span>
                </div>
            </div>
        </div>
        
        <div class="px-6 pb-6">
            <div class="relative group">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋姓名、編號、職業或地區..." 
                    class="w-full py-3.5 pl-11 pr-12 rounded-2xl bg-white/10 focus:bg-white/20 border-none text-sm text-white placeholder-blue-300 outline-none transition-all shadow-inner">
                <div id="clearFilterBtn" onclick="clearAllFilters()" class="hidden absolute right-3 top-1/2 -translate-y-1/2 px-3 py-1.5 bg-blue-500 hover:bg-blue-400 rounded-xl text-[10px] font-bold cursor-pointer transition-colors shadow-sm">
                    清除
                </div>
            </div>
        </div>
    </header>

    <!-- 篩選指示 -->
    <div id="filterIndicator" class="hidden px-6 py-3 bg-blue-50 border-b border-blue-100 flex items-center justify-between animate-slideDown">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></span>
            <span id="filterLabel" class="text-xs font-black text-blue-600 uppercase italic"></span>
        </div>
        <button onclick="clearAllFilters()" class="text-xs font-bold text-slate-400 hover:text-blue-600 transition-colors">重設檢視</button>
    </div>

    <!-- 組織樹容器 -->
    <main id="network-container" class="p-6 space-y-1"></main>

    <!-- 編輯彈窗 -->
    <div id="editModal" class="modal items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg max-h-[92vh] overflow-hidden flex flex-col shadow-2xl relative">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="font-black text-slate-800 text-lg">Partner Profile</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-400 text-2xl hover:text-slate-600 transition-colors">&times;</button>
            </div>

            <div class="overflow-y-auto p-8 space-y-6 pb-40 no-scrollbar">
                <!-- 基本資訊 -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5 col-span-1">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">成員編號 Amway ID</label>
                        <input type="text" id="editAmwayId" placeholder="例如: 1234567" class="w-full p-4 bg-blue-50/30 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                    <div class="space-y-1.5 col-span-1">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">身分 Rank</label>
                        <select id="editLevel" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none appearance-none">
                            <option value="distributor">🟢 直銷商 (DD/PRO)</option>
                            <option value="member">🟠 一般會員 (MEMBER)</option>
                            <option value="lead">🔴 待開發 (POTENTIAL)</option>
                        </select>
                    </div>
                    <div class="space-y-1.5 col-span-2">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">姓名 Name</label>
                        <input type="text" id="editName" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">職業 Job</label>
                        <input type="text" id="editJob" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">地區 Area</label>
                        <input type="text" id="editLocation" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">直屬上線 Sponsor</label>
                    <select id="editParentId" class="w-full p-4 bg-blue-50/50 border-2 border-blue-100 focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none appearance-none"></select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">當前狀態 Status</label>
                    <textarea id="editStatus" rows="2" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none resize-none"></textarea>
                </div>

                <!-- 日誌區塊 -->
                <div class="pt-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Activity Log</label>
                        <span id="journalCount" class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black">0</span>
                    </div>
                    
                    <div class="bg-blue-50/50 p-4 rounded-3xl space-y-3 border border-blue-100">
                        <div class="flex gap-2">
                            <input type="date" id="newJournalDate" class="p-3 bg-white border-none rounded-xl text-xs font-bold shadow-sm outline-none">
                            <input type="text" id="newJournalInput" placeholder="輸入跟進紀錄..." class="flex-1 p-3 bg-white border-none rounded-xl text-xs font-bold shadow-sm outline-none">
                        </div>
                        <button onclick="addJournalEntry()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-xs font-black shadow-md shadow-blue-100 hover:bg-blue-700 transition-colors">＋ 新增紀錄</button>
                    </div>

                    <div id="journalList" class="space-y-3"></div>
                </div>
            </div>

            <!-- 底部動作 -->
            <div class="absolute bottom-0 left-0 right-0 p-6 border-t bg-white/80 backdrop-blur-md flex gap-3 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                <button onclick="saveChanges()" class="flex-[3] bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-200 btn-active-scale transition-all hover:bg-blue-700">儲存資料</button>
                <button onclick="confirmDelete()" class="flex-1 bg-rose-50 text-rose-600 py-4 rounded-2xl font-black btn-active-scale border border-rose-100 hover:bg-rose-100 transition-colors">刪除</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 -->
    <div id="deleteConfirmModal" class="modal items-center justify-center p-6" style="z-index: 200;">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xs p-8 shadow-2xl text-center border border-slate-100">
            <div class="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </div>
            <h3 class="text-xl font-black text-slate-800 mb-2">確定刪除？</h3>
            <p class="text-xs text-slate-400 font-bold mb-8 leading-relaxed">此操作將永久移除該成員及其所有下線組織，無法復原。</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteConfirm()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-500 btn-active-scale">取消</button>
                <button onclick="executeDelete()" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-lg shadow-rose-200 btn-active-scale">刪除</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbyZ75mgqzR-A_jwdfTd7nIViAnIMMlnbL_f6wP6iXGTYzgl-hM91gM_xJ58IyxRVnM/exec"; 
        
        let currentAccount = localStorage.getItem('amway_active_acc') || "";
        let networkData = []; 
        let collapsedNodes = new Set();
        let currentEditId = null;
        let currentFilterText = "";
        let activeStatFilter = null; 
        let tempJournals = [];
        let syncTimeout = null;
        let isSyncing = false;

        window.onload = () => {
            if (currentAccount) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('displayAccount').innerText = "Admin: " + currentAccount;
                loadLocalData();
                fetchFromCloud();
            }
            document.getElementById('newJournalDate').valueAsDate = new Date();
        };

        function login() {
            const acc = document.getElementById('accountInput').value.trim();
            if (!acc) return;
            currentAccount = acc;
            localStorage.setItem('amway_active_acc', acc);
            document.getElementById('displayAccount').innerText = "Admin: " + acc;
            document.getElementById('loginModal').style.display = 'none';
            fetchFromCloud();
        }

        function loadLocalData() {
            const raw = localStorage.getItem("amway_data_" + currentAccount);
            try {
                networkData = raw ? JSON.parse(raw) : [];
                renderNetwork();
            } catch (e) { networkData = []; }
        }

        function saveLocal() {
            localStorage.setItem("amway_data_" + currentAccount, JSON.stringify(networkData));
            scheduleSync();
        }

        function scheduleSync() {
            if (syncTimeout) clearTimeout(syncTimeout);
            const icon = document.getElementById('syncStatusIcon');
            icon.classList.remove('hidden', 'syncing-icon');
            syncTimeout = setTimeout(() => { uploadToCloud(); }, 3000); 
        }

        async function fetchFromCloud() {
            if (!CLOUD_API_URL || !currentAccount) return;
            updateStatus("同步中", "blue", true);
            try {
                const res = await fetch(`${CLOUD_API_URL}?accountId=${currentAccount}`);
                const data = await res.json();
                networkData = data.map(item => ({
                    ...item,
                    amway_id: item.amway_id || "",
                    journals: typeof item.journals === 'string' ? JSON.parse(item.journals) : (Array.isArray(item.journals) ? item.journals : [])
                }));
                localStorage.setItem("amway_data_" + currentAccount, JSON.stringify(networkData));
                renderNetwork();
                updateStatus("連線正常", "green");
            } catch (e) {
                updateStatus("離線模式", "orange");
                loadLocalData();
            }
        }

        async function uploadToCloud() {
            if (!currentAccount || isSyncing) return;
            isSyncing = true;
            const icon = document.getElementById('syncStatusIcon');
            icon.classList.remove('hidden');
            icon.classList.add('syncing-icon');
            try {
                const payload = networkData.map(node => ({ ...node, journals: JSON.stringify(node.journals) }));
                await fetch(CLOUD_API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ accountId: currentAccount, data: payload }), 
                    mode: 'no-cors' 
                });
                updateStatus("已儲存", "green");
            } catch (e) {
                updateStatus("同步失敗", "red");
            } finally {
                isSyncing = false;
                setTimeout(() => {
                    icon.classList.add('hidden');
                    icon.classList.remove('syncing-icon');
                }, 1000);
            }
        }

        function toggleStatFilter(type) {
            activeStatFilter = (activeStatFilter === type) ? null : type;
            updateStatUI();
            renderNetwork();
        }

        function updateStatUI() {
            document.querySelectorAll('.stat-card').forEach(el => el.classList.remove('active'));
            const indicator = document.getElementById('filterIndicator');
            const label = document.getElementById('filterLabel');
            const clearBtn = document.getElementById('clearFilterBtn');

            if (activeStatFilter) {
                const target = document.getElementById(`stat-${activeStatFilter}`);
                if (target) target.classList.add('active');
                indicator.classList.remove('hidden');
                clearBtn.classList.remove('hidden');
                const labels = { distributor: '核心直銷商', member: '一般會員', total: '核心名單 (D+M)', lead: '潛在開發對象' };
                label.innerText = `正在檢視: ${labels[activeStatFilter]}`;
            } else {
                indicator.classList.add('hidden');
                if (!currentFilterText) clearBtn.classList.add('hidden');
            }
        }

        function clearAllFilters() {
            activeStatFilter = null;
            currentFilterText = "";
            document.getElementById('searchInput').value = "";
            updateStatUI();
            renderNetwork();
        }

        function handleSearch() {
            currentFilterText = document.getElementById('searchInput').value.trim();
            const clearBtn = document.getElementById('clearFilterBtn');
            if (currentFilterText || activeStatFilter) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');
            renderNetwork();
        }

        function renderNetwork() {
            updateStats();
            const container = document.getElementById('network-container');
            container.innerHTML = '';
            
            const isFiltering = (activeStatFilter || currentFilterText !== "");
            const searchLower = currentFilterText.toLowerCase();

            function matchesType(node) {
                if (!activeStatFilter) return true;
                if (activeStatFilter === 'distributor') return node.level === 'distributor';
                if (activeStatFilter === 'member') return node.level === 'member';
                if (activeStatFilter === 'lead') return node.level === 'lead';
                if (activeStatFilter === 'total') return (node.level === 'distributor' || node.level === 'member');
                return true;
            }

            function matchesSearch(node) {
                if (!currentFilterText) return true;
                return node.name.toLowerCase().includes(searchLower) || 
                       (node.amway_id && node.amway_id.toLowerCase().includes(searchLower)) ||
                       (node.location && node.location.toLowerCase().includes(searchLower)) ||
                       (node.job && node.job.toLowerCase().includes(searchLower)) ||
                       (node.status && node.status.toLowerCase().includes(searchLower));
            }

            if (isFiltering) {
                const filteredNodes = networkData.filter(n => matchesType(n) && matchesSearch(n));
                if (filteredNodes.length === 0) {
                    container.innerHTML = `<div class="text-center py-32 text-slate-300"><div class="text-4xl mb-4">🔍</div><div class="font-bold">找不到相符的人員</div></div>`;
                    return;
                }
                filteredNodes.forEach(node => container.innerHTML += generateNodeHTML(node, 0, false, true));
            } else {
                const treeData = translateFlatToTree(networkData);
                if (networkData.length === 0) {
                    container.innerHTML = `<div class="text-center py-32 text-slate-300"><div class="text-4xl mb-4">🌱</div><div class="font-bold">尚未建立組織，請點擊「新增頂層」</div></div>`;
                    return;
                }
                function buildTreeHTML(node, depth = 0, isHiddenByParent = false) {
                    const isCollapsed = collapsedNodes.has(node.id);
                    let html = generateNodeHTML(node, depth, isCollapsed, false, isHiddenByParent);
                    if (node.children) {
                        node.children.forEach(c => {
                            html += buildTreeHTML(c, depth + 1, isHiddenByParent || isCollapsed);
                        });
                    }
                    return html;
                }
                treeData.forEach(root => container.innerHTML += buildTreeHTML(root));
            }
        }

        function generateNodeHTML(node, depth, isCollapsed, isFlat, isHidden) {
            const borderColor = node.level === 'distributor' ? 'border-emerald-500' : (node.level === 'member' ? 'border-amber-500' : 'border-rose-500');
            const levelLabel = node.level === 'distributor' ? '直銷商' : (node.level === 'member' ? '會員' : '待開發');
            const levelBg = node.level === 'distributor' ? 'bg-emerald-50 text-emerald-600' : (node.level === 'member' ? 'bg-amber-50 text-amber-600' : 'bg-rose-50 text-rose-600');
            
            const hasChildren = !isFlat && node.children && node.children.length > 0;
            const displayStyle = isHidden ? 'display: none;' : 'display: block;';

            return `
                <div class="node-card transition-all" style="${displayStyle} margin-left: ${depth * 20}px; position: relative;">
                    ${!isFlat && depth > 0 ? '<div class="tree-line"></div><div class="tree-connector"></div>' : ''}
                    <div class="relative z-10 flex items-center p-4 mb-3 rounded-[1.5rem] bg-white shadow-sm border-l-[6px] ${borderColor} active:bg-slate-50 cursor-pointer" onclick="openEditModal('${node.id}')">
                        <div class="mr-2 w-6 h-6 flex items-center justify-center">
                            ${hasChildren ? `
                                <div onclick="toggleCollapse('${node.id}', event)" class="w-full h-full flex items-center justify-center transition-transform ${isCollapsed ? '' : 'rotate-90 text-blue-500'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                                    </svg>
                                </div>
                            ` : ''}
                        </div>
                        <div class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center mr-4 border border-slate-200 text-xs font-black text-slate-500 shadow-inner">
                            ${node.name.charAt(0)}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-black text-slate-800">${node.name}</span>
                                ${node.amway_id ? `<span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold">#${node.amway_id}</span>` : ''}
                            </div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase mt-0.5">${node.location || '地區未填'} • ${node.job || '職業未填'}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-[10px] font-black px-3 py-1.5 ${levelBg} rounded-xl uppercase">
                                ${levelLabel}
                            </div>
                            ${!isFlat ? `<button onclick="event.stopPropagation(); openAddModal('${node.id}')" class="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl text-xl font-black hover:bg-blue-600 hover:text-white transition-all">＋</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function translateFlatToTree(flatData) {
            const map = {}; const roots = [];
            flatData.forEach(node => { map[node.id] = { ...node, children: [] }; });
            flatData.forEach(node => {
                if (node.parentId && map[node.parentId]) { map[node.parentId].children.push(map[node.id]); } 
                else { roots.push(map[node.id]); }
            });
            return roots;
        }

        function toggleCollapse(id, event) {
            event.stopPropagation();
            if (collapsedNodes.has(id)) collapsedNodes.delete(id);
            else collapsedNodes.add(id);
            renderNetwork();
        }

        function openEditModal(id) {
            currentEditId = id;
            const n = networkData.find(x => x.id === id);
            if (!n) return;

            document.getElementById('editName').value = n.name || "";
            document.getElementById('editAmwayId').value = n.amway_id || "";
            document.getElementById('editLevel').value = n.level || "lead";
            document.getElementById('editJob').value = n.job || "";
            document.getElementById('editLocation').value = n.location || "";
            document.getElementById('editStatus').value = n.status || "";
            tempJournals = Array.isArray(n.journals) ? [...n.journals] : [];
            renderJournals();
            
            const parentSelect = document.getElementById('editParentId');
            parentSelect.innerHTML = '<option value="">根節點 (無上線)</option>';
            
            const illegalIds = new Set();
            const collectChildren = (targetId) => {
                illegalIds.add(targetId);
                networkData.forEach(node => { if (node.parentId === targetId) collectChildren(node.id); });
            };
            collectChildren(id);

            networkData.forEach(node => {
                if (!illegalIds.has(node.id)) {
                    const opt = document.createElement('option');
                    opt.value = node.id;
                    opt.text = `👤 ${node.name}`;
                    if (node.id === n.parentId) opt.selected = true;
                    parentSelect.appendChild(opt);
                }
            });
            document.getElementById('editModal').classList.add('active');
        }

        function saveChanges() {
            const idx = networkData.findIndex(x => x.id === currentEditId);
            if (idx === -1) return;
            networkData[idx].name = document.getElementById('editName').value || "未命名";
            networkData[idx].amway_id = document.getElementById('editAmwayId').value.trim();
            networkData[idx].level = document.getElementById('editLevel').value;
            networkData[idx].job = document.getElementById('editJob').value;
            networkData[idx].location = document.getElementById('editLocation').value;
            networkData[idx].status = document.getElementById('editStatus').value;
            networkData[idx].parentId = document.getElementById('editParentId').value || null;
            networkData[idx].journals = [...tempJournals];
            saveLocal(); renderNetwork(); closeModal(); 
        }

        function renderJournals() {
            const list = document.getElementById('journalList');
            document.getElementById('journalCount').innerText = tempJournals.length;
            const sorted = [...tempJournals].sort((a, b) => new Date(b.date) - new Date(a.date));
            list.innerHTML = sorted.map((j, i) => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-start shadow-sm border border-slate-100 group">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-[9px] font-black uppercase">${j.date}</span>
                        </div>
                        <div class="text-xs font-bold text-slate-700 leading-relaxed">${j.text}</div>
                    </div>
                    <button onclick="deleteJournal(${tempJournals.indexOf(j)})" class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-rose-500 transition-colors">&times;</button>
                </div>
            `).join('') || '<div class="text-center text-slate-300 text-[10px] py-10 font-bold uppercase tracking-widest">No activities yet</div>';
        }

        function addJournalEntry() {
            const textInput = document.getElementById('newJournalInput');
            if (!textInput.value.trim()) return;
            const dateInput = document.getElementById('newJournalDate');
            tempJournals.push({ 
                date: (dateInput.value || new Date().toISOString().split('T')[0]).replace(/-/g, '/'), 
                text: textInput.value.trim() 
            });
            textInput.value = ''; 
            renderJournals();
        }

        function deleteJournal(i) { tempJournals.splice(i, 1); renderJournals(); }
        function closeModal() { document.getElementById('editModal').classList.remove('active'); }
        function confirmDelete() { document.getElementById('deleteConfirmModal').classList.add('active'); }
        function closeDeleteConfirm() { document.getElementById('deleteConfirmModal').classList.remove('active'); }
        
        function executeDelete() {
            const idsToDelete = new Set();
            const collect = (id) => {
                idsToDelete.add(id);
                networkData.forEach(n => { if (n.parentId === id) collect(n.id); });
            };
            collect(currentEditId);
            networkData = networkData.filter(n => !idsToDelete.has(n.id));
            saveLocal(); renderNetwork(); closeDeleteConfirm(); closeModal(); 
        }

        function openAddModal(pId) {
            const newNode = { 
                id: 'id-' + Date.now(), 
                amway_id: '',
                parentId: pId, 
                name: '新成員', 
                level: 'lead', 
                journals: [], 
                location: '', 
                job: '', 
                status: '', 
                account_id: currentAccount 
            };
            networkData.push(newNode);
            saveLocal(); 
            renderNetwork(); 
            openEditModal(newNode.id);
        }

        function updateStats() {
            const d = networkData.filter(n => n.level === 'distributor').length;
            const m = networkData.filter(n => n.level === 'member').length;
            const l = networkData.filter(n => n.level === 'lead').length;
            document.getElementById('distributorCount').innerText = d;
            document.getElementById('memberCount').innerText = m;
            document.getElementById('totalFocusCount').innerText = d + m; 
            document.getElementById('leadCount').innerText = l;
        }

        function updateStatus(txt, color) {
            const dot = document.getElementById('statusDot');
            const stxt = document.getElementById('displayAccount');
            const colors = { blue: '#3b82f6', green: '#10b981', red: '#ef4444', orange: '#f59e0b' };
            dot.style.backgroundColor = colors[color] || '#cbd5e1';
            stxt.innerText = `Admin: ${currentAccount} (${txt})`;
        }

        async function forceSync() {
            if (isSyncing) return;
            await uploadToCloud();
            await fetchFromCloud();
        }
    </script>
</body>
</html>
