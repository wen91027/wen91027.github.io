<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安麗組織管理系統 - 高速版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal {
            transition: opacity 0.2s ease;
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 100; 
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }
        .tree-line {
            position: absolute;
            left: -18px; top: -12px; bottom: 20px;
            width: 2px; background-color: #e2e8f0;
        }
        .tree-connector {
            position: absolute;
            left: -18px; top: 22px;
            width: 14px; height: 2px; background-color: #e2e8f0;
        }
        .btn-active-scale:active { transform: scale(0.96); }
        .rotate-90 { transform: rotate(90deg); }
        .transition-transform { transition: transform 0.2s ease; }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .syncing-icon { animation: spin-slow 1s linear infinite; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sync-pending { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-900 font-sans">

    <!-- 登入介面 (保持不變) -->
    <div id="loginModal" class="modal items-center justify-center p-6" style="display: flex;">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl text-center border border-slate-100">
            <div class="mb-4 flex justify-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </div>
            </div>
            <h2 class="text-xl font-bold mb-2">管理員登入</h2>
            <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest">Administrator Login</p>
            <input type="text" id="accountInput" placeholder="請輸入編號" 
                class="w-full p-4 border-2 border-slate-100 rounded-2xl text-center text-xl font-bold mb-4 focus:border-blue-500 outline-none">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg btn-active-scale">進入系統</button>
        </div>
    </div>

    <!-- 頂部導航 -->
    <header class="bg-blue-700 text-white sticky top-0 shadow-lg z-40">
        <div class="p-4 border-b border-blue-600/50">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h1 class="text-lg font-bold flex items-center gap-2">
                        Amway Manager
                        <span id="syncStatusIcon" class="hidden">
                            <svg class="w-3 h-3 syncing-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </span>
                    </h1>
                    <div class="text-[10px] flex items-center">
                        <span id="statusDot" class="w-2 h-2 rounded-full bg-gray-400 mr-1"></span>
                        <span id="displayAccount">未登入</span>
                        <span id="statusText" class="ml-1 opacity-60"></span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="forceSync()" class="p-2 bg-blue-600 rounded-full btn-active-scale">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" /></svg>
                    </button>
                    <button onclick="openAddModal(null)" class="bg-white text-blue-700 px-4 py-1 rounded-full text-sm font-bold shadow-sm btn-active-scale">+ 頂層</button>
                </div>
            </div>
            
            <!-- 數據統計 -->
            <div class="flex gap-2 mt-2">
                <div class="flex-1 bg-white/10 rounded-xl p-2 flex flex-col items-center">
                    <span class="text-[9px] uppercase opacity-70">直銷商</span>
                    <span id="distributorCount" class="text-lg font-black italic">0</span>
                </div>
                <div class="flex-1 bg-white/10 rounded-xl p-2 flex flex-col items-center">
                    <span class="text-[9px] uppercase opacity-70">會員</span>
                    <span id="memberCount" class="text-lg font-black italic">0</span>
                </div>
                <div class="flex-1 bg-white/10 rounded-xl p-2 flex flex-col items-center">
                    <span class="text-[9px] uppercase opacity-70">總數</span>
                    <span id="totalFocusCount" class="text-lg font-black italic">0</span>
                </div>
            </div>
        </div>
        
        <div class="p-3 bg-blue-800">
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="快速搜尋夥伴..." 
                class="w-full p-2.5 rounded-xl bg-blue-900/50 border-none text-sm text-white placeholder-blue-300 outline-none">
        </div>
    </header>

    <!-- 組織樹容器 -->
    <main id="network-container" class="p-4 space-y-1"></main>

    <!-- 編輯彈窗 (內容結構與上版相同) -->
    <div id="editModal" class="modal items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col shadow-2xl relative">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <span class="font-bold text-slate-800">編輯夥伴</span>
                <button onclick="closeModal()" class="text-slate-400 text-2xl px-2">&times;</button>
            </div>

            <div class="overflow-y-auto p-6 space-y-5 pb-32">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1">姓名</label>
                        <input type="text" id="editName" class="p-3 border rounded-xl text-sm bg-slate-50">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1">級別</label>
                        <select id="editLevel" class="p-3 border rounded-xl text-sm bg-slate-50">
                            <option value="distributor">直銷商 (DD/PRO)</option>
                            <option value="member">一般會員 (MEMBER)</option>
                            <option value="lead">潛在對象 (LEAD)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1">職業</label>
                        <input type="text" id="editJob" class="p-3 border rounded-xl text-sm bg-slate-50">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] text-slate-400 font-bold ml-1">地區</label>
                        <input type="text" id="editLocation" class="p-3 border rounded-xl text-sm bg-slate-50">
                    </div>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold ml-1">上線領導人</label>
                    <select id="editParentId" class="p-3 border rounded-xl text-sm bg-blue-50 border-blue-100"></select>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-slate-400 font-bold ml-1">經營現況</label>
                    <textarea id="editStatus" rows="2" class="p-3 border rounded-xl text-sm bg-slate-50 resize-none"></textarea>
                </div>

                <div class="border-t pt-4">
                    <label class="text-[10px] font-bold text-slate-400 flex justify-between items-center mb-3">
                        <span>日誌紀錄</span>
                        <span id="journalCount" class="bg-slate-100 px-2 py-0.5 rounded-full text-slate-500">0</span>
                    </label>
                    <div class="flex flex-col gap-2 mb-4">
                        <div class="flex gap-2">
                            <input type="date" id="newJournalDate" class="p-2 border rounded-lg text-xs bg-slate-50">
                            <input type="text" id="newJournalInput" placeholder="寫點什麼..." class="flex-1 p-2 border rounded-lg text-xs">
                        </div>
                        <button onclick="addJournalEntry()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">新增紀錄</button>
                    </div>
                    <div id="journalList" class="space-y-2"></div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-5 border-t bg-white flex gap-3 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                <button onclick="saveChanges()" class="flex-[3] bg-blue-600 text-white py-4 rounded-2xl font-bold btn-active-scale shadow-lg">儲存並背景同步</button>
                <button onclick="confirmDelete()" class="flex-1 bg-rose-50 text-rose-600 py-4 rounded-2xl font-bold btn-active-scale border border-rose-100">刪除</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 (保持不變) -->
    <div id="deleteConfirmModal" class="modal items-center justify-center p-6" style="z-index: 200;">
        <div class="bg-white rounded-3xl w-full max-w-xs p-6 shadow-2xl text-center">
            <h3 class="text-lg font-bold mb-2">確定刪除此成員？</h3>
            <p class="text-sm text-gray-400 mb-6">這將一併移除其下屬所有組織成員。</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteConfirm()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-600">取消</button>
                <button onclick="executeDelete()" class="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold">刪除</button>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbyZ75mgqzR-A_jwdfTd7nIViAnIMMlnbL_f6wP6iXGTYzgl-hM91gM_xJ58IyxRVnM/exec"; 
        
        let currentAccount = localStorage.getItem('amway_active_acc') || "";
        let networkData = []; 
        let collapsedNodes = new Set();
        let currentEditId = null;
        let currentFilter = "";
        let tempJournals = [];
        
        // 性能優化關鍵：同步排程器
        let syncTimeout = null;
        let isSyncing = false;

        window.onload = () => {
            if (currentAccount) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('displayAccount').innerText = "帳號: " + currentAccount;
                loadLocalData();
                fetchFromCloud(); // 初始從雲端拉取
            }
        };

        function login() {
            const acc = document.getElementById('accountInput').value.trim();
            if (!acc) return;
            currentAccount = acc;
            localStorage.setItem('amway_active_acc', acc);
            document.getElementById('displayAccount').innerText = "帳號: " + acc;
            document.getElementById('loginModal').style.display = 'none';
            fetchFromCloud();
        }

        function loadLocalData() {
            const raw = localStorage.getItem("amway_data_" + currentAccount);
            try {
                networkData = raw ? JSON.parse(raw) : [];
                renderNetwork();
            } catch (e) { networkData = []; }
        }

        function saveLocal() {
            localStorage.setItem("amway_data_" + currentAccount, JSON.stringify(networkData));
            // 每次本地儲存後，啟動排程同步 (3秒後執行)
            scheduleSync();
        }

        function scheduleSync() {
            if (syncTimeout) clearTimeout(syncTimeout);
            document.getElementById('syncStatusIcon').classList.remove('hidden');
            document.getElementById('syncStatusIcon').classList.add('sync-pending');
            
            syncTimeout = setTimeout(() => {
                uploadToCloud();
            }, 3000); // 延遲3秒，合併連續操作
        }

        async function forceSync() {
            await fetchFromCloud();
        }

        async function fetchFromCloud() {
            if (!CLOUD_API_URL || !currentAccount) return;
            updateStatus("同步中", "blue", true);
            try {
                const res = await fetch(`${CLOUD_API_URL}?accountId=${currentAccount}`);
                const data = await res.json();
                networkData = data.map(item => ({
                    ...item,
                    journals: typeof item.journals === 'string' ? JSON.parse(item.journals) : (Array.isArray(item.journals) ? item.journals : [])
                }));
                // 更新本地
                localStorage.setItem("amway_data_" + currentAccount, JSON.stringify(networkData));
                renderNetwork();
                updateStatus("已連線", "green");
            } catch (e) {
                updateStatus("連線失敗", "red");
                loadLocalData();
            }
        }

        async function uploadToCloud() {
            if (!currentAccount || isSyncing) return;
            
            isSyncing = true;
            document.getElementById('syncStatusIcon').classList.remove('sync-pending');
            document.getElementById('syncStatusIcon').classList.add('syncing-icon');
            
            try {
                const payload = networkData.map(node => ({
                    ...node,
                    journals: JSON.stringify(node.journals)
                }));
                
                // 使用 POST 提交完整資料
                await fetch(CLOUD_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ accountId: currentAccount, data: payload }),
                    mode: 'no-cors' // Google Apps Script 跨網域常用模式
                });
                
                updateStatus("已同步", "green");
            } catch (e) {
                updateStatus("同步中斷", "orange");
            } finally {
                isSyncing = false;
                document.getElementById('syncStatusIcon').classList.add('hidden');
                document.getElementById('syncStatusIcon').classList.remove('syncing-icon');
            }
        }

        function renderNetwork() {
            updateStats();
            const container = document.getElementById('network-container');
            const treeData = translateFlatToTree(networkData);
            container.innerHTML = '';
            
            const isSearching = currentFilter !== "";
            const searchLower = currentFilter.toLowerCase();

            function checkMatch(node) {
                const selfMatch = node.name.toLowerCase().includes(searchLower) || 
                                 (node.location && node.location.toLowerCase().includes(searchLower)) ||
                                 (node.job && node.job.toLowerCase().includes(searchLower));
                if (selfMatch) return true;
                if (node.children) return node.children.some(c => checkMatch(c));
                return false;
            }

            function buildHTML(node, depth = 0, isHiddenByParent = false) {
                const hasMatchInBranch = isSearching ? checkMatch(node) : true;
                if (isSearching && !hasMatchInBranch) return '';

                const isCollapsed = collapsedNodes.has(node.id);
                const borderColor = node.level === 'distributor' ? 'border-green-500' : (node.level === 'member' ? 'border-orange-500' : 'border-rose-500');
                const hasChildren = node.children && node.children.length > 0;
                
                const effectiveCollapsed = isSearching ? false : isCollapsed;
                const displayClass = (!isSearching && isHiddenByParent) ? 'hidden' : 'block';

                let html = `
                <div class="${displayClass}" style="margin-left: ${depth * 18}px; position: relative;">
                    ${depth > 0 ? '<div class="tree-line"></div><div class="tree-connector"></div>' : ''}
                    <div class="relative z-10 flex items-center p-3 mb-2 rounded-2xl bg-white shadow-sm border-l-4 ${borderColor} active:bg-slate-50 cursor-pointer" onclick="openEditModal('${node.id}')">
                        <div class="mr-1 w-6 h-6 flex items-center justify-center">
                            ${(hasChildren && !isSearching) ? `
                                <div onclick="toggleCollapse('${node.id}', event)" class="w-full h-full flex items-center justify-center transition-transform ${effectiveCollapsed ? '' : 'rotate-90 text-blue-500'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                                    </svg>
                                </div>
                            ` : ''}
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mr-3 border text-[10px] font-bold text-slate-400">
                            ${node.name.charAt(0)}
                        </div>
                        <div class="flex-1">
                            <div class="text-sm font-bold text-slate-800">${node.name}</div>
                            <div class="text-[9px] text-slate-400 uppercase tracking-tighter">${node.location || '未知'} • ${node.job || '未填'}</div>
                        </div>
                        <button onclick="event.stopPropagation(); openAddModal('${node.id}')" class="p-2 text-blue-500 text-lg">＋</button>
                    </div>
                </div>`;
                
                if (node.children) {
                    node.children.forEach(c => {
                        html += buildHTML(c, depth + 1, isHiddenByParent || effectiveCollapsed);
                    });
                }
                return html;
            }
            
            if (networkData.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-300 text-sm italic">點擊上方「+ 頂層」開始建立</div>`;
            } else {
                treeData.forEach(root => container.innerHTML += buildHTML(root));
            }
        }

        // --- 以下為通用邏輯 (保持與上版相容但優化效能) ---
        function translateFlatToTree(flatData) {
            const map = {}; const roots = [];
            flatData.forEach(node => { map[node.id] = { ...node, children: [] }; });
            flatData.forEach(node => {
                if (node.parentId && map[node.parentId]) { map[node.parentId].children.push(map[node.id]); } 
                else { roots.push(map[node.id]); }
            });
            return roots;
        }

        function toggleCollapse(id, event) {
            event.stopPropagation();
            if (collapsedNodes.has(id)) collapsedNodes.delete(id);
            else collapsedNodes.add(id);
            renderNetwork();
        }

        function handleSearch() {
            currentFilter = document.getElementById('searchInput').value.trim();
            renderNetwork();
        }

        function openEditModal(id) {
            currentEditId = id;
            const n = networkData.find(x => x.id === id);
            if (!n) return;

            document.getElementById('editName').value = n.name || "";
            document.getElementById('editLevel').value = n.level || "lead";
            document.getElementById('editJob').value = n.job || "";
            document.getElementById('editLocation').value = n.location || "";
            document.getElementById('editStatus').value = n.status || "";
            
            tempJournals = Array.isArray(n.journals) ? [...n.journals] : [];
            renderJournals();
            
            const parentSelect = document.getElementById('editParentId');
            parentSelect.innerHTML = '<option value="">--- (頂層) ---</option>';
            networkData.forEach(node => {
                if (node.id !== id) {
                    const opt = document.createElement('option');
                    opt.value = node.id;
                    opt.text = node.name;
                    if (node.id === n.parentId) opt.selected = true;
                    parentSelect.appendChild(opt);
                }
            });
            document.getElementById('editModal').classList.add('active');
        }

        function saveChanges() {
            const idx = networkData.findIndex(x => x.id === currentEditId);
            if (idx === -1) return;
            networkData[idx].name = document.getElementById('editName').value || "無名";
            networkData[idx].level = document.getElementById('editLevel').value;
            networkData[idx].job = document.getElementById('editJob').value;
            networkData[idx].location = document.getElementById('editLocation').value;
            networkData[idx].status = document.getElementById('editStatus').value;
            networkData[idx].parentId = document.getElementById('editParentId').value || null;
            networkData[idx].journals = [...tempJournals];
            
            saveLocal(); // 觸發本地儲存與排程同步
            renderNetwork(); 
            closeModal(); 
        }

        function renderJournals() {
            const list = document.getElementById('journalList');
            document.getElementById('journalCount').innerText = tempJournals.length;
            const sorted = [...tempJournals].sort((a, b) => new Date(b.date) - new Date(a.date));
            list.innerHTML = sorted.map((j, i) => `
                <div class="bg-slate-50 p-2 rounded-lg text-[11px] flex justify-between items-start border border-slate-100">
                    <div class="flex-1">
                        <span class="font-bold text-blue-500 mr-2">${j.date}</span>
                        <span class="text-slate-700">${j.text}</span>
                    </div>
                    <button onclick="deleteJournal(${tempJournals.indexOf(j)})" class="text-rose-400 ml-2">&times;</button>
                </div>
            `).join('') || '<div class="text-center text-slate-300 text-[10px] py-4">無紀錄</div>';
        }

        function addJournalEntry() {
            const dateInput = document.getElementById('newJournalDate');
            const textInput = document.getElementById('newJournalInput');
            if (!textInput.value.trim()) return;
            tempJournals.push({ date: (dateInput.value || new Date().toISOString().split('T')[0]).replace(/-/g, '/'), text: textInput.value.trim() });
            textInput.value = '';
            renderJournals();
        }

        function deleteJournal(i) { tempJournals.splice(i, 1); renderJournals(); }
        function closeModal() { document.getElementById('editModal').classList.remove('active'); }
        function confirmDelete() { document.getElementById('deleteConfirmModal').classList.add('active'); }
        function closeDeleteConfirm() { document.getElementById('deleteConfirmModal').classList.remove('active'); }
        
        function executeDelete() {
            const idsToDelete = new Set();
            const collect = (id) => {
                idsToDelete.add(id);
                networkData.forEach(n => { if (n.parentId === id) collect(n.id); });
            };
            collect(currentEditId);
            networkData = networkData.filter(n => !idsToDelete.has(n.id));
            saveLocal(); 
            renderNetwork(); 
            closeDeleteConfirm(); 
            closeModal(); 
        }

        function openAddModal(pId) {
            const newNode = { 
                id: 'id-' + Date.now(), parentId: pId, name: '新夥伴', level: 'lead', 
                journals: [], location: '', job: '', status: '', account_id: currentAccount
            };
            networkData.push(newNode);
            saveLocal(); renderNetwork(); openEditModal(newNode.id);
        }

        function updateStats() {
            const d = networkData.filter(n => n.level === 'distributor').length;
            const m = networkData.filter(n => n.level === 'member').length;
            document.getElementById('distributorCount').innerText = d;
            document.getElementById('memberCount').innerText = m;
            document.getElementById('totalFocusCount').innerText = d + m;
        }

        function updateStatus(txt, color, pulse) {
            const dot = document.getElementById('statusDot');
            const stxt = document.getElementById('statusText');
            if(stxt) stxt.innerText = "(" + txt + ")";
            dot.className = "w-2 h-2 rounded-full mr-1 " + (pulse ? 'sync-pulse' : '');
            dot.style.backgroundColor = { blue: '#3b82f6', green: '#22c55e', red: '#ef4444', orange: '#f59e0b' }[color];
        }
    </script>
</body>
</html>
