<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amway Pro - 組織連動管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .modal { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.6); z-index: 100; backdrop-filter: blur(8px); }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .tree-line { position: absolute; left: -20px; top: -12px; bottom: 24px; width: 2px; background: linear-gradient(to bottom, #e2e8f0, #cbd5e1); }
        .tree-connector { position: absolute; left: -20px; top: 22px; width: 16px; height: 2px; background-color: #cbd5e1; border-radius: 0 2px 2px 0; }
        .btn-active-scale:active { transform: scale(0.96); }
        .stat-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card.active { background-color: white !important; color: #1e40af !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .syncing-icon { animation: spin-slow 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-900 overflow-x-hidden">

    <!-- 登入介面 -->
    <div id="loginModal" class="modal items-center justify-center p-6" style="display: flex;">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-10 shadow-2xl text-center border border-slate-100">
            <div class="mb-6 flex justify-center">
                <div class="w-20 h-20 bg-blue-600 text-white rounded-3xl rotate-12 flex items-center justify-center shadow-xl shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 -rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-1">Amway Pro</h2>
            <p class="text-[10px] text-slate-400 mb-8 uppercase tracking-[0.2em] font-semibold">Leadership System</p>
            <div class="space-y-4">
                <input type="text" id="accountInput" placeholder="輸入管理員 ID (Account ID)" 
                    class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-center text-xl font-bold transition-all outline-none">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 btn-active-scale transition-all hover:bg-blue-700">立即進入</button>
            </div>
        </div>
    </div>

    <!-- 頂部導航 -->
    <header class="bg-blue-700 text-white sticky top-0 shadow-2xl z-40 rounded-b-[2rem]">
        <div class="px-6 pt-6 pb-4">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
                        組織儀表板
                        <span id="syncStatusIcon" class="hidden">
                            <svg class="w-4 h-4 syncing-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </span>
                    </h1>
                    <div class="flex items-center mt-0.5">
                        <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-300 mr-2"></span>
                        <span id="displayAccount" class="text-[10px] font-bold opacity-80 uppercase tracking-wider">等待登入...</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="forceSync()" class="p-3 bg-white/10 hover:bg-white/20 rounded-2xl btn-active-scale transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                    <button onclick="openAddModal(null)" class="bg-white text-blue-700 px-5 py-2 rounded-2xl text-sm font-black shadow-lg btn-active-scale transition-transform hover:scale-105">+ 新增成員</button>
                </div>
            </div>
            
            <div class="grid grid-cols-4 gap-2 mb-2">
                <div onclick="toggleStatFilter('distributor')" id="stat-distributor" class="stat-card bg-white/10 rounded-2xl p-3 flex flex-col items-center cursor-pointer">
                    <span class="text-[9px] font-bold opacity-60">直銷商</span>
                    <span id="distributorCount" class="text-lg font-black mt-0.5">0</span>
                </div>
                <div onclick="toggleStatFilter('member')" id="stat-member" class="stat-card bg-white/10 rounded-2xl p-3 flex flex-col items-center cursor-pointer">
                    <span class="text-[9px] font-bold opacity-60">會員</span>
                    <span id="memberCount" class="text-lg font-black mt-0.5">0</span>
                </div>
                <div onclick="toggleStatFilter('total')" id="stat-total" class="stat-card bg-white/10 rounded-2xl p-3 flex flex-col items-center cursor-pointer border-blue-400/30 border">
                    <span class="text-[9px] font-bold opacity-80 text-blue-100">核心合計</span>
                    <span id="totalFocusCount" class="text-lg font-black mt-0.5">0</span>
                </div>
                <div onclick="toggleStatFilter('lead')" id="stat-lead" class="stat-card bg-rose-500/20 rounded-2xl p-3 flex flex-col items-center cursor-pointer border border-rose-400/30">
                    <span class="text-[9px] font-bold text-rose-200">待開發</span>
                    <span id="leadCount" class="text-lg font-black text-rose-50 mt-0.5">0</span>
                </div>
            </div>
            <div class="text-[9px] text-blue-200/60 font-medium px-1 mb-1 italic">* 組織人數已含連動夥伴數據</div>
        </div>
        
        <div class="px-6 pb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋姓名、編號、地區..." 
                    class="w-full py-3.5 pl-11 pr-12 rounded-2xl bg-white/10 focus:bg-white/20 border-none text-sm text-white placeholder-blue-300 outline-none transition-all shadow-inner">
                <div id="clearFilterBtn" onclick="clearAllFilters()" class="hidden absolute right-3 top-1/2 -translate-y-1/2 px-3 py-1.5 bg-blue-500 hover:bg-blue-400 rounded-xl text-[10px] font-bold cursor-pointer transition-colors">清除</div>
            </div>
        </div>
    </header>

    <div id="filterIndicator" class="hidden px-6 py-3 bg-blue-50 border-b border-blue-100 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></span>
            <span id="filterLabel" class="text-xs font-black text-blue-600 uppercase italic"></span>
        </div>
        <button onclick="clearAllFilters()" class="text-xs font-bold text-slate-400 hover:text-blue-600 transition-colors">取消過濾</button>
    </div>

    <main id="network-container" class="p-6 space-y-1"></main>

    <!-- 編輯彈窗 -->
    <div id="editModal" class="modal items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg max-h-[92vh] overflow-hidden flex flex-col shadow-2xl relative">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="font-black text-slate-800 text-lg">編輯夥伴資料</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-400 text-2xl hover:text-slate-600 transition-colors">&times;</button>
            </div>

            <div class="overflow-y-auto p-8 space-y-6 pb-40 no-scrollbar">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5 col-span-1">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">安麗編號 (Amway ID)</label>
                        <input type="text" id="editAmwayId" placeholder="輸入後自動連動組織" class="w-full p-4 bg-blue-50/50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                    <div class="space-y-1.5 col-span-1">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">級別</label>
                        <select id="editLevel" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                            <option value="distributor">🟢 直銷商</option>
                            <option value="member">🟠 一般會員</option>
                            <option value="lead">🔴 待開發</option>
                        </select>
                    </div>
                    <div class="space-y-1.5 col-span-2">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">姓名</label>
                        <input type="text" id="editName" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">職業</label>
                        <input type="text" id="editJob" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">地區</label>
                        <input type="text" id="editLocation" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">直屬上線</label>
                    <select id="editParentId" class="w-full p-4 bg-blue-50/50 border-2 border-blue-100 focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none"></select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] text-slate-400 font-black ml-1 uppercase">當前狀態</label>
                    <textarea id="editStatus" rows="2" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl text-sm font-bold transition-all outline-none resize-none"></textarea>
                </div>

                <div class="pt-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">跟進紀錄</label>
                        <span id="journalCount" class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black">0</span>
                    </div>
                    <div class="bg-blue-50/50 p-4 rounded-3xl space-y-3 border border-blue-100">
                        <div class="flex gap-2">
                            <input type="date" id="newJournalDate" class="p-3 bg-white border-none rounded-xl text-xs font-bold shadow-sm outline-none">
                            <input type="text" id="newJournalInput" placeholder="在此輸入新的紀錄..." class="flex-1 p-3 bg-white border-none rounded-xl text-xs font-bold shadow-sm outline-none">
                        </div>
                        <button onclick="addJournalEntry()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-xs font-black shadow-md hover:bg-blue-700">＋ 新增紀錄</button>
                    </div>
                    <div id="journalList" class="space-y-3"></div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-6 border-t bg-white/80 backdrop-blur-md flex gap-3">
                <button onclick="saveChanges()" class="flex-[3] bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-200 btn-active-scale hover:bg-blue-700 transition-all">儲存並同步</button>
                <button onclick="confirmDelete()" class="flex-1 bg-rose-50 text-rose-600 py-4 rounded-2xl font-black btn-active-scale border border-rose-100 hover:bg-rose-100">刪除</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 -->
    <div id="deleteConfirmModal" class="modal items-center justify-center p-6" style="z-index: 200;">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xs p-8 shadow-2xl text-center">
            <h3 class="text-xl font-black text-slate-800 mb-2">確定要刪除？</h3>
            <p class="text-xs text-slate-400 font-bold mb-8">此操作將永久移除該成員及其下線，無法復原。</p>
            <div class="flex gap-3">
                <button onclick="closeDeleteConfirm()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-slate-500">取消</button>
                <button onclick="executeDelete()" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black shadow-lg shadow-rose-200">確認刪除</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心設定 (已更新為您的實體網址) ---
        const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbyZ75mgqzR-A_jwdfTd7nIViAnIMMlnbL_f6wP6iXGTYzgl-hM91gM_xJ58IyxRVnM/exec";
        
        let currentAccount = localStorage.getItem('amway_active_acc') || "";
        let networkData = []; 
        let globalStatsMap = {}; 
        let collapsedNodes = new Set();
        let currentEditId = null;
        let currentFilterText = "";
        let activeStatFilter = null; 
        let tempJournals = [];
        let syncTimeout = null;
        let isSyncing = false;

        window.onload = () => {
            if (currentAccount) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('displayAccount').innerText = "Admin: " + currentAccount;
                loadLocalData();
                fetchFromCloud();
            }
            document.getElementById('newJournalDate').valueAsDate = new Date();
        };

        function login() {
            const acc = document.getElementById('accountInput').value.trim();
            if (!acc) return;
            currentAccount = acc;
            localStorage.setItem('amway_active_acc', acc);
            document.getElementById('displayAccount').innerText = "Admin: " + acc;
            document.getElementById('loginModal').style.display = 'none';
            fetchFromCloud();
        }

        function loadLocalData() {
            const raw = localStorage.getItem("amway_data_" + currentAccount);
            try {
                networkData = raw ? JSON.parse(raw) : [];
                renderNetwork();
            } catch (e) { networkData = []; }
        }

        async function fetchFromCloud() {
            if (!CLOUD_API_URL || !currentAccount) return;
            updateStatus("同步中...", "blue");
            try {
                const res = await fetch(`${CLOUD_API_URL}?accountId=${currentAccount}`);
                const result = await res.json();
                
                // 處理個人資料
                networkData = (result.personal || []).map(item => ({
                    ...item,
                    journals: typeof item.journals === 'string' ? JSON.parse(item.journals) : item.journals
                }));

                // 處理全局連動數據
                globalStatsMap = result.globalStats || {};
                
                localStorage.setItem("amway_data_" + currentAccount, JSON.stringify(networkData));
                renderNetwork();
                updateStatus("已更新", "green");
            } catch (e) {
                updateStatus("離線模式", "orange");
                loadLocalData();
            }
        }

        async function uploadToCloud() {
            if (!currentAccount || isSyncing) return;
            isSyncing = true;
            document.getElementById('syncStatusIcon').classList.remove('hidden');
            try {
                const payload = networkData.map(node => ({ ...node, journals: JSON.stringify(node.journals) }));
                await fetch(CLOUD_API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ accountId: currentAccount, data: payload }), 
                    mode: 'no-cors' 
                });
                updateStatus("雲端已儲存", "green");
            } catch (e) {
                updateStatus("存檔失敗", "red");
            } finally {
                isSyncing = false;
                setTimeout(() => { document.getElementById('syncStatusIcon').classList.add('hidden'); }, 1000);
            }
        }

        function saveLocal() {
            localStorage.setItem("amway_data_" + currentAccount, JSON.stringify(networkData));
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(uploadToCloud, 3000);
        }

        function updateStats() {
            let d = 0, m = 0, l = 0;
            networkData.forEach(node => {
                if (node.level === 'distributor') d++;
                else if (node.level === 'member') m++;
                else if (node.level === 'lead') l++;

                // 連動加總：若 ID 不同於登入者且存在於全局統計中
                if (node.amway_id && node.amway_id !== currentAccount && globalStatsMap[node.amway_id]) {
                    const stats = globalStatsMap[node.amway_id];
                    d += (stats.distributor || 0);
                    m += (stats.member || 0);
                }
            });
            document.getElementById('distributorCount').innerText = d;
            document.getElementById('memberCount').innerText = m;
            document.getElementById('totalFocusCount').innerText = d + m;
            document.getElementById('leadCount').innerText = l;
        }

        function renderNetwork() {
            updateStats();
            const container = document.getElementById('network-container');
            container.innerHTML = '';
            
            const isFiltering = (activeStatFilter || currentFilterText !== "");
            const searchLower = currentFilterText.toLowerCase();

            function matchesType(node) {
                if (!activeStatFilter) return true;
                if (activeStatFilter === 'distributor') return node.level === 'distributor';
                if (activeStatFilter === 'member') return node.level === 'member';
                if (activeStatFilter === 'lead') return node.level === 'lead';
                if (activeStatFilter === 'total') return (node.level === 'distributor' || node.level === 'member');
                return true;
            }

            function matchesSearch(node) {
                if (!currentFilterText) return true;
                return node.name.toLowerCase().includes(searchLower) || (node.amway_id && node.amway_id.includes(searchLower));
            }

            if (isFiltering) {
                const filtered = networkData.filter(n => matchesType(n) && matchesSearch(n));
                filtered.forEach(node => container.innerHTML += generateNodeHTML(node, 0, false, true));
            } else {
                const tree = translateFlatToTree(networkData);
                function build(node, depth = 0, isHidden = false) {
                    const collapsed = collapsedNodes.has(node.id);
                    let html = generateNodeHTML(node, depth, collapsed, false, isHidden);
                    if (node.children) {
                        node.children.forEach(c => html += build(c, depth + 1, isHidden || collapsed));
                    }
                    return html;
                }
                tree.forEach(root => container.innerHTML += build(root));
            }
        }

        function generateNodeHTML(node, depth, isCollapsed, isFlat, isHidden) {
            const borderColor = node.level === 'distributor' ? 'border-emerald-500' : (node.level === 'member' ? 'border-amber-500' : 'border-rose-500');
            const levelLabel = node.level === 'distributor' ? '直銷商' : (node.level === 'member' ? '會員' : '待開發');
            const levelBg = node.level === 'distributor' ? 'bg-emerald-50 text-emerald-600' : (node.level === 'member' ? 'bg-amber-50 text-amber-600' : 'bg-rose-50 text-rose-600');
            const isLinked = node.amway_id && node.amway_id !== currentAccount && globalStatsMap[node.amway_id];

            return `
                <div class="node-card" style="${isHidden ? 'display: none;' : 'display: block;'} margin-left: ${depth * 20}px; position: relative;">
                    ${!isFlat && depth > 0 ? '<div class="tree-line"></div><div class="tree-connector"></div>' : ''}
                    <div class="relative z-10 flex items-center p-4 mb-3 rounded-3xl bg-white shadow-sm border-l-[6px] ${borderColor} active:bg-slate-50 cursor-pointer" onclick="openEditModal('${node.id}')">
                        <div class="mr-2 w-6 h-6 flex items-center justify-center">
                            ${!isFlat && node.children && node.children.length > 0 ? `
                                <div onclick="toggleCollapse('${node.id}', event)" class="w-full h-full flex items-center justify-center transition-transform ${isCollapsed ? '' : 'rotate-90 text-blue-500'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                                </div>
                            ` : ''}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-black text-slate-800">${node.name}</span>
                                ${isLinked ? `<span class="px-1.5 py-0.5 bg-blue-50 text-blue-600 rounded text-[8px] font-black border border-blue-100 flex items-center gap-1">
                                    <span class="w-1 h-1 bg-blue-600 rounded-full animate-pulse"></span>連動中</span>` : ''}
                            </div>
                            <div class="text-[9px] text-slate-400 font-bold mt-0.5">ID: ${node.amway_id || '未填'} • ${node.location || '地區未填'}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="text-[9px] font-black px-2 py-1 ${levelBg} rounded-lg uppercase">${levelLabel}</div>
                            ${!isFlat ? `<button onclick="event.stopPropagation(); openAddModal('${node.id}')" class="w-7 h-7 flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl font-black">＋</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function translateFlatToTree(flatData) {
            const map = {}; const roots = [];
            flatData.forEach(n => map[n.id] = { ...n, children: [] });
            flatData.forEach(n => {
                if (n.parentId && map[n.parentId]) map[n.parentId].children.push(map[n.id]);
                else roots.push(map[n.id]);
            });
            return roots;
        }

        function toggleCollapse(id, e) { e.stopPropagation(); if (collapsedNodes.has(id)) collapsedNodes.delete(id); else collapsedNodes.add(id); renderNetwork(); }

        function openEditModal(id) {
            currentEditId = id;
            const n = networkData.find(x => x.id === id);
            if (!n) return;
            document.getElementById('editName').value = n.name;
            document.getElementById('editAmwayId').value = n.amway_id || "";
            document.getElementById('editLevel').value = n.level;
            document.getElementById('editJob').value = n.job || "";
            document.getElementById('editLocation').value = n.location || "";
            document.getElementById('editStatus').value = n.status || "";
            tempJournals = [...(n.journals || [])];
            renderJournals();
            
            const ps = document.getElementById('editParentId');
            ps.innerHTML = '<option value="">根節點</option>';
            networkData.forEach(node => {
                if (node.id !== id) {
                    const opt = document.createElement('option');
                    opt.value = node.id; opt.text = node.name;
                    if (node.id === n.parentId) opt.selected = true;
                    ps.appendChild(opt);
                }
            });
            document.getElementById('editModal').classList.add('active');
        }

        function saveChanges() {
            const idx = networkData.findIndex(x => x.id === currentEditId);
            if (idx === -1) return;
            networkData[idx].name = document.getElementById('editName').value || "新成員";
            networkData[idx].amway_id = document.getElementById('editAmwayId').value.trim();
            networkData[idx].level = document.getElementById('editLevel').value;
            networkData[idx].job = document.getElementById('editJob').value;
            networkData[idx].location = document.getElementById('editLocation').value;
            networkData[idx].status = document.getElementById('editStatus').value;
            networkData[idx].parentId = document.getElementById('editParentId').value || null;
            networkData[idx].journals = [...tempJournals];
            saveLocal(); renderNetwork(); closeModal();
        }

        function addJournalEntry() {
            const t = document.getElementById('newJournalInput');
            const d = document.getElementById('newJournalDate');
            if (!t.value.trim()) return;
            tempJournals.push({ date: d.value.replace(/-/g, '/'), text: t.value.trim() });
            t.value = ""; renderJournals();
        }

        function renderJournals() {
            const l = document.getElementById('journalList');
            document.getElementById('journalCount').innerText = tempJournals.length;
            l.innerHTML = tempJournals.map((j, i) => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-start border border-slate-100">
                    <div>
                        <div class="text-[9px] font-black text-blue-500 mb-1">${j.date}</div>
                        <div class="text-xs font-bold text-slate-700">${j.text}</div>
                    </div>
                    <button onclick="deleteJournal(${i})" class="text-slate-300">&times;</button>
                </div>
            `).reverse().join('');
        }

        function deleteJournal(i) { tempJournals.splice(i, 1); renderJournals(); }
        function closeModal() { document.getElementById('editModal').classList.remove('active'); }
        function openAddModal(p) { const id = 'id-' + Date.now(); networkData.push({ id, name: "新成員", level: "lead", parentId: p, journals: [] }); saveLocal(); renderNetwork(); openEditModal(id); }
        function confirmDelete() { document.getElementById('deleteConfirmModal').classList.add('active'); }
        function closeDeleteConfirm() { document.getElementById('deleteConfirmModal').classList.remove('active'); }
        function executeDelete() { networkData = networkData.filter(n => n.id !== currentEditId); saveLocal(); renderNetwork(); closeDeleteConfirm(); closeModal(); }
        
        function handleSearch() { currentFilterText = document.getElementById('searchInput').value; document.getElementById('clearFilterBtn').classList.toggle('hidden', !currentFilterText); renderNetwork(); }
        function toggleStatFilter(t) { activeStatFilter = (activeStatFilter === t) ? null : t; updateStatUI(); renderNetwork(); }
        function updateStatUI() {
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            if (activeStatFilter) document.getElementById('stat-' + activeStatFilter).classList.add('active');
            document.getElementById('filterIndicator').classList.toggle('hidden', !activeStatFilter);
            document.getElementById('filterLabel').innerText = activeStatFilter ? "篩選: " + activeStatFilter : "";
        }
        function clearAllFilters() { activeStatFilter = null; currentFilterText = ""; document.getElementById('searchInput').value = ""; updateStatUI(); renderNetwork(); }
        function updateStatus(txt, col) { const d = document.getElementById('statusDot'); const colors = { blue: '#3b82f6', green: '#10b981', orange: '#f59e0b', red: '#ef4444' }; d.style.backgroundColor = colors[col]; }
        async function forceSync() { await uploadToCloud(); await fetchFromCloud(); }
    </script>
</body>
</html>
